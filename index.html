<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scholarship Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0d2419;
      --bg-main: #1A4731;
      --accent: #FFF4CC;
      --glass-bg: rgba(255, 244, 204, 0.05);
      --glass-border: rgba(255, 244, 204, 0.15);
      --glass-hover: rgba(255, 244, 204, 0.12);
      --font: 'DM Sans', sans-serif;
    }

    /* Invisible Scrollbars */
    *::-webkit-scrollbar { display: none; }
    * { 
      margin: 0; padding: 0; box-sizing: border-box; 
      -ms-overflow-style: none; scrollbar-width: none; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: var(--font);
      background: linear-gradient(160deg, var(--bg-dark), var(--bg-main));
      color: var(--accent);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
    }

    header {
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 10px;
    }

    h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }

    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 25px;
    }

    .nav-tabs button {
      background: var(--glass-bg);
      color: var(--accent);
      border: 1px solid var(--glass-border);
      padding: 12px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-family: var(--font);
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-tabs button.active {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 4px 15px rgba(255, 244, 204, 0.3);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 100px;
    }

    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover {
      background: var(--glass-hover);
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    .card-badge {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: rgba(255, 244, 204, 0.15);
      padding: 4px 12px;
      border-radius: 10px;
      width: fit-content;
    }

    .card-title { font-size: 18px; font-weight: 700; line-height: 1.3; }
    .card-sub { font-size: 14px; opacity: 0.7; }

    /* AI Chat UI */
    #chatSection { display: none; flex-direction: column; height: 70vh; }
    
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .msg {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 15px;
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: var(--bg-main);
      border-bottom-right-radius: 4px;
    }

    .msg.ai {
      align-self: flex-start;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
    }

    .chat-input-area {
      display: flex;
      gap: 12px;
      padding: 20px;
      border-top: 1px solid var(--glass-border);
    }

    .chat-input-area input {
      flex: 1;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      color: var(--accent);
      padding: 14px 20px;
      border-radius: 30px;
      outline: none;
      font-family: var(--font);
    }

    .chat-input-area button {
      background: var(--accent);
      color: var(--bg-main);
      border: none;
      padding: 0 25px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 700;
    }

    /* Detail Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      opacity: 0; pointer-events: none; transition: 0.3s;
    }

    .modal-overlay.active { opacity: 1; pointer-events: auto; }

    .modal-content {
      width: 90%; max-width: 550px; max-height: 85vh;
      overflow-y: auto; padding: 40px; position: relative;
    }

    .close-btn {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none; color: var(--accent);
      font-size: 28px; cursor: pointer;
    }

    .detail-row { margin-bottom: 20px; }
    .detail-label { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
    .detail-value { font-size: 17px; font-weight: 400; line-height: 1.4; }

    .loader { text-align: center; padding: 50px; font-style: italic; opacity: 0.6; }

  </style>
</head>
<body>

  <header>
    <h1>Scholarship Explorer</h1>
  </header>

  <div class="nav-tabs">
    <button id="tabBrowse" class="active" onclick="switchTab('browse')">Browse</button>
    <button id="tabChat" onclick="switchTab('chat')">AI Assistant</button>
  </div>

  <div class="container">
    <div id="browseSection">
      <div id="loader" class="loader">Accessing Database...</div>
      <div id="grid" class="grid"></div>
    </div>

    <div id="chatSection" class="glass">
      <div class="chat-box" id="chatBox">
        <div class="msg ai">Hello! I'm your AI assistant. I have access to your scholarship spreadsheet. How can I help you today?</div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Ask about deadlines or requirements..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="glass modal-content" onclick="event.stopPropagation()">
      <button class="close-btn" onclick="closeModal()">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    // --- SETTINGS: Update this with your deployed Apps Script URL ---
    const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQG4Eg9mD3JhcTExS_r1-58_HD9JTey90Ub-I48M3cUscqCpmjd2_HTupTmQCAdszKZg/exec"; 
    
    let scholarshipData = [];

    async function loadData() {
      try {
        const response = await fetch(`${APPSCRIPT_URL}?action=getScholarships`);
        const data = await response.json();
        scholarshipData = data;
        renderGrid();
      } catch (e) {
        document.getElementById('loader').innerText = "Error connecting to database.";
      }
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      document.getElementById('loader').style.display = 'none';
      grid.innerHTML = '';
      
      scholarshipData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'glass card';
        card.onclick = () => openModal(index);
        card.innerHTML = `
          <div class="card-badge">${item.Category || 'Program'}</div>
          <div class="card-title">${item.Program || item.Scholarship || 'Scholarship'}</div>
          <div class="card-sub">${item.Provider || item.University || item.Country || ''}</div>
        `;
        grid.appendChild(card);
      });
    }

    function switchTab(type) {
      document.getElementById('browseSection').style.display = type === 'browse' ? 'block' : 'none';
      document.getElementById('chatSection').style.display = type === 'chat' ? 'flex' : 'none';
      document.getElementById('tabBrowse').classList.toggle('active', type === 'browse');
      document.getElementById('tabChat').classList.toggle('active', type === 'chat');
    }

    function openModal(index) {
      const s = scholarshipData[index];
      const body = document.getElementById('modalBody');
      let html = `<h2 style="margin-bottom:30px; color:var(--accent);">${s.Program || s.Scholarship}</h2>`;
      
      for (const [key, value] of Object.entries(s)) {
        if (value && value !== "null" && key !== "Program" && key !== "Scholarship") {
          html += `
            <div class="detail-row">
              <div class="detail-label">${key.replace(/_/g, ' ')}</div>
              <div class="detail-value">${value}</div>
            </div>
          `;
        }
      }
      body.innerHTML = html;
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      appendMessage('user', text);
      input.value = '';

      // Send the top 15 results as context to the AI (to keep it fast)
      const context = JSON.stringify(scholarshipData.slice(0, 15));

      try {
        const res = await fetch(APPSCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'askAI',
            question: text,
            context: context
          })
        });
        const data = await res.json();
        appendMessage('ai', data.answer);
      } catch (e) {
        appendMessage('ai', "Sorry, I'm having trouble connecting to the AI.");
      }
    }

    function appendMessage(role, text) {
      const box = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerText = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // Initialize
    loadData();
  </script>
</body>
</html>
